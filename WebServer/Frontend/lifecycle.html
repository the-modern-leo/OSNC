<html>
  <head>
    {% module HeaderHtml() %}
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col">
      {% module HeaderNav() %}
        </div>
      </div>
      <div class="row">
        <div class="col-sm">
          <form>
          <div class="form-group">
            <label for="exampleInputEmail1">Switch IP Address</label>
            <input type="Switch IP Address" class="form-control" id="exampleInputEmail1" aria-describedby="ipHelp" placeholder="Enter IP address">
            <small id="ipHelp" class="form-text text-muted">We'll never share your email with anyone else.</small>
          </div>
          <div class="custom-file">
            <input type="file" class="custom-file-input" id="customFile">
            <label class="custom-file-label" for="customFile">Choose file</label>
          </div>
          <button type="submit" class="btn btn-primary">Submit</button>
        </form>
        </div>
      </div>
      <div class="row">
        <table class="table">
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">First</th>
              <th scope="col">Last</th>
              <th scope="col">Handle</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th scope="row">1</th>
              <td>Mark</td>
              <td>Otto</td>
              <td>@mdo</td>
            </tr>
            <tr>
              <th scope="row">2</th>
              <td>Jacob</td>
              <td>Thornton</td>
              <td>@fat</td>
            </tr>
            <tr>
              <th scope="row">3</th>
              <td>Larry</td>
              <td>the Bird</td>
              <td>@twitter</td>
            </tr>
          </tbody>
        </table>
      </div>
  </body>
</html>

<script>
// Add the following code if you want the name of the file appear on select
$(".custom-file-input").on("change", function() {
  var fileName = $(this).val().split("\\").pop();
  $(this).siblings(".custom-file-label").addClass("selected").html(fileName);
});
</script>
